<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management System</title>
<link rel="stylesheet" href="StudentMngSys.css">
</head>

<body>

<div class="container">

    <div class="studentAdd">
        <h2>Student Management System</h2>

        <label>Name:</label>
        <input type="text" id="name" placeholder="Enter name"><br>
        <span id="nameError"></span><br>

        <label>Age:</label>
        <input type="number" id="age" placeholder="Enter age"><br>
        <span id="ageError"></span><br>

        <button id="addBtn">Add Student</button>
        <button id="displayStudent">Display Students</button>
    </div>

    <div id="studentSection">
        <h3>Student List</h3>
        <ul id="studentList"></ul>
    </div>

</div>

<script src="StudentMngSys.js"></script>

</body>
</html>
