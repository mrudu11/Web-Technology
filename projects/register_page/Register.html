<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Page</title>
</head>
<body>

<form id="registerForm" novalidate>
    <h2>Register Form</h2>

   
    <label>Name :</label><br>
    <input type="text" id="name" placeholder="Enter full name"><br>
    <span id="nameError" style="color:red;"></span><br><br>

    
    <label>Email :</label><br>
    <input type="email" id="email" placeholder="Enter email"><br>
    <span id="emailError" style="color:red;"></span><br><br>

   
    <label>Phone Number :</label><br>
    <input type="text" id="phone" placeholder="Enter 10 digit phone number"><br>
    <span id="phoneError" style="color:red;"></span><br><br>

    <button type="submit">Register</button>
</form>

<script src="Register.js"></script>

</body>
</html>
